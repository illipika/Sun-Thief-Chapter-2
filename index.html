<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sun Thief — II</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1208;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      cursor: none;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      opacity: 0.18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      mix-blend-mode: overlay;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (bgImg.complete) drawBg();
});

// ── Assets ─────────────────────────────────────────────────────────────────
const bgImg = new Image();
bgImg.src = 'Your.png';  // hillside photo

const sunImg = new Image();
sunImg.src = 'Your__1_.png';  // sunball scan (contains 3 balls on white bg)

// ── State ──────────────────────────────────────────────────────────────────
let sceneReady = false;      // both images loaded
let ballsVisible = false;    // triggered on first mouse move
let assetsLoaded = 0;

function onAssetLoad() {
  assetsLoaded++;
  if (assetsLoaded === 2) {
    sceneReady = true;
    loop();
  }
}
bgImg.onload = onAssetLoad;
sunImg.onload = onAssetLoad;

// ── Cursor ─────────────────────────────────────────────────────────────────
const mouse = { x: W / 2, y: H / 2 };
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  if (!ballsVisible) spawnBalls();
});

// ── Sunballs ───────────────────────────────────────────────────────────────
// We extract 3 sub-regions from the sunball scan image.
// The scan image has 3 balls:
//   top-left (~large), top-right (~medium), bottom-left (~small)
// These are approximate crop regions relative to the full image size.
const BALL_CROPS = [
  { sx: 0.12, sy: 0.03, sw: 0.29, sh: 0.56 },   // large  (top-left)
  { sx: 0.60, sy: 0.03, sw: 0.29, sh: 0.56 },   // medium (top-right)
  { sx: 0.22, sy: 0.55, sw: 0.18, sh: 0.45 },   // small  (bottom-left)
];

// Display sizes for the 3 balls (relative to viewport height)
const BALL_SIZES = [0.13, 0.10, 0.07];

// Starting home positions in sky region (x%, y%)
const BALL_HOME = [
  { x: 0.22, y: 0.18 },
  { x: 0.62, y: 0.12 },
  { x: 0.44, y: 0.22 },
];

class Ball {
  constructor(index) {
    this.index = index;
    this.crop = BALL_CROPS[index];
    this.radius = BALL_SIZES[index] * Math.min(W, H) * 0.5;
    this.home = { x: BALL_HOME[index].x * W, y: BALL_HOME[index].y * H };

    // Position starts at home
    this.x = this.home.x;
    this.y = this.home.y;
    this.vx = 0;
    this.vy = 0;

    // Fade in
    this.alpha = 0;
    this.visible = false;
    this.fadeDelay = index * 420; // stagger
    this.fadedIn = false;

    // Drag state
    this.dragging = false;
    this.dragOffX = 0;
    this.dragOffY = 0;
    this.lastMouseX = 0;
    this.lastMouseY = 0;
    this.throwVX = 0;
    this.throwVY = 0;

    // Flight state
    this.flying = false;
    this.returning = false;

    // Gentle idle float
    this.floatPhase = Math.random() * Math.PI * 2;
    this.floatAmp = 5 + Math.random() * 6;
    this.floatSpeed = 0.0006 + Math.random() * 0.0004;

    // Glow pulse
    this.glowPhase = Math.random() * Math.PI * 2;
  }

  startFade(timestamp) {
    this.fadeStart = timestamp + this.fadeDelay;
    this.visible = true;
  }

  update(timestamp, dt) {
    if (!this.visible) return;

    // Fade in
    if (!this.fadedIn) {
      const elapsed = timestamp - this.fadeStart;
      this.alpha = Math.min(1, elapsed / 1200);
      if (this.alpha >= 1) this.fadedIn = true;
      return; // don't move while fading in
    }

    this.glowPhase += 0.02;

    if (this.dragging) {
      // Track velocity for throw
      this.throwVX = (mouse.x - this.dragOffX - this.lastMouseX) * 0.6 + this.throwVX * 0.4;
      this.throwVY = (mouse.y - this.dragOffY - this.lastMouseY) * 0.6 + this.throwVY * 0.4;
      this.lastMouseX = mouse.x - this.dragOffX;
      this.lastMouseY = mouse.y - this.dragOffY;
      this.x = mouse.x - this.dragOffX;
      this.y = mouse.y - this.dragOffY;
      return;
    }

    if (this.flying) {
      this.x += this.vx;
      this.y += this.vy;

      // Check if fully off screen
      const r = this.radius;
      if (this.x < -r * 2 || this.x > W + r * 2 || this.y < -r * 2 || this.y > H + r * 2) {
        // Re-enter from opposite side
        this.returning = true;
        this.flying = false;

        // Wrap position to opposite edge
        if (this.x < -r * 2)      this.x = W + r;
        else if (this.x > W + r * 2) this.x = -r;
        if (this.y < -r * 2)      this.y = H + r;
        else if (this.y > H + r * 2) this.y = -r;

        // Head roughly back toward home
        const dx = this.home.x - this.x;
        const dy = this.home.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const speed = 3.5 + Math.random() * 2;
        this.vx = (dx / dist) * speed;
        this.vy = (dy / dist) * speed;
      }
      return;
    }

    if (this.returning) {
      this.x += this.vx;
      this.y += this.vy;

      // Slow down as approaching home
      const dx = this.home.x - this.x;
      const dy = this.home.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 60) {
        this.vx *= 0.88;
        this.vy *= 0.88;
      }

      if (dist < 8) {
        this.x = this.home.x;
        this.y = this.home.y;
        this.vx = 0;
        this.vy = 0;
        this.returning = false;
      }
      return;
    }

    // Idle float
    this.floatPhase += this.floatSpeed * dt;
    this.x = this.home.x + Math.sin(this.floatPhase) * this.floatAmp;
    this.y = this.home.y + Math.cos(this.floatPhase * 0.7) * this.floatAmp * 0.6;
  }

  throw() {
    this.flying = true;
    this.returning = false;
    // Amplify throw velocity
    const speed = Math.sqrt(this.throwVX ** 2 + this.throwVY ** 2);
    const minSpeed = 8;
    if (speed < minSpeed) {
      const angle = Math.atan2(this.throwVY, this.throwVX);
      this.vx = Math.cos(angle) * minSpeed;
      this.vy = Math.sin(angle) * minSpeed;
    } else {
      this.vx = this.throwVX * 1.4;
      this.vy = this.throwVY * 1.4;
    }
    this.throwVX = 0;
    this.throwVY = 0;
  }

  isHit(mx, my) {
    const dx = mx - this.x;
    const dy = my - this.y;
    return Math.sqrt(dx * dx + dy * dy) < this.radius * 0.9;
  }

  draw() {
    if (!this.visible || this.alpha <= 0) return;

    ctx.save();
    ctx.globalAlpha = this.alpha;

    const r = this.radius;
    const glow = 0.7 + 0.3 * Math.sin(this.glowPhase);

    // Outer glow
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 1.8);
    grad.addColorStop(0, `rgba(255, 200, 60, ${0.25 * glow})`);
    grad.addColorStop(0.5, `rgba(255, 120, 20, ${0.12 * glow})`);
    grad.addColorStop(1, 'rgba(255, 80, 0, 0)');
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * 1.8, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Draw cropped sunball from scan
    const iw = sunImg.naturalWidth;
    const ih = sunImg.naturalHeight;
    const c = this.crop;
    const sx = c.sx * iw;
    const sy = c.sy * ih;
    const sw = c.sw * iw;
    const sh = c.sh * ih;

    // Clip to circle
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.clip();

    // Draw with multiply-ish blend to drop the white background
    ctx.globalCompositeOperation = 'multiply';
    ctx.globalAlpha = this.alpha * 0.92;
    ctx.drawImage(sunImg, sx, sy, sw, sh, this.x - r, this.y - r, r * 2, r * 2);

    ctx.restore();

    // Second pass: lighten center
    ctx.save();
    ctx.globalAlpha = this.alpha * 0.45 * glow;
    ctx.globalCompositeOperation = 'screen';
    const innerGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 0.7);
    innerGrad.addColorStop(0, 'rgba(255, 240, 160, 1)');
    innerGrad.addColorStop(1, 'rgba(255, 140, 20, 0)');
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = innerGrad;
    ctx.fill();
    ctx.restore();
  }
}

// ── Balls array ────────────────────────────────────────────────────────────
const balls = [new Ball(0), new Ball(1), new Ball(2)];
let spawnTimestamp = null;

function spawnBalls() {
  if (ballsVisible) return;
  ballsVisible = true;
  spawnTimestamp = performance.now();
  balls.forEach(b => b.startFade(spawnTimestamp));
}

// ── Drag handling ──────────────────────────────────────────────────────────
let draggedBall = null;

window.addEventListener('mousedown', e => {
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    if (b.fadedIn && b.isHit(e.clientX, e.clientY)) {
      draggedBall = b;
      b.dragging = true;
      b.flying = false;
      b.returning = false;
      b.dragOffX = e.clientX - b.x;
      b.dragOffY = e.clientY - b.y;
      b.lastMouseX = b.x;
      b.lastMouseY = b.y;
      b.throwVX = 0;
      b.throwVY = 0;
      break;
    }
  }
});

window.addEventListener('mouseup', () => {
  if (draggedBall) {
    draggedBall.dragging = false;
    draggedBall.throw();
    draggedBall = null;
  }
});

// Touch support
window.addEventListener('touchstart', e => {
  const t = e.touches[0];
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    if (b.fadedIn && b.isHit(t.clientX, t.clientY)) {
      draggedBall = b;
      b.dragging = true;
      b.flying = false;
      b.returning = false;
      b.dragOffX = t.clientX - b.x;
      b.dragOffY = t.clientY - b.y;
      b.lastMouseX = b.x;
      b.lastMouseY = b.y;
      b.throwVX = 0;
      b.throwVY = 0;
      break;
    }
  }
}, { passive: true });

window.addEventListener('touchmove', e => {
  if (draggedBall) {
    const t = e.touches[0];
    mouse.x = t.clientX;
    mouse.y = t.clientY;
  }
}, { passive: true });

window.addEventListener('touchend', () => {
  if (draggedBall) {
    draggedBall.dragging = false;
    draggedBall.throw();
    draggedBall = null;
  }
});

// ── Cursor dot ─────────────────────────────────────────────────────────────
function drawCursor() {
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  const hovering = balls.some(b => b.fadedIn && b.isHit(mouse.x, mouse.y));
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, hovering ? 7 : 3, 0, Math.PI * 2);
  ctx.fillStyle = hovering ? 'rgba(255, 210, 80, 0.9)' : 'rgba(255, 255, 255, 0.55)';
  ctx.fill();
  ctx.restore();
}

// ── Background ─────────────────────────────────────────────────────────────
function drawBg() {
  // Cover-fit the background image
  const iw = bgImg.naturalWidth;
  const ih = bgImg.naturalHeight;
  const scale = Math.max(W / iw, H / ih);
  const dw = iw * scale;
  const dh = ih * scale;
  const dx = (W - dw) / 2;
  const dy = (H - dh) / 2;
  ctx.drawImage(bgImg, dx, dy, dw, dh);

  // Subtle dark vignette
  const vig = ctx.createRadialGradient(W / 2, H / 2, H * 0.2, W / 2, H / 2, H * 0.85);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

// ── Main loop ──────────────────────────────────────────────────────────────
let lastTime = 0;

function loop(timestamp = 0) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  ctx.clearRect(0, 0, W, H);
  drawBg();

  balls.forEach(b => {
    b.radius = BALL_SIZES[b.index] * Math.min(W, H) * 0.5;
    b.home = {
      x: BALL_HOME[b.index].x * W,
      y: BALL_HOME[b.index].y * H
    };
    b.update(timestamp, dt);
    b.draw();
  });

  drawCursor();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
