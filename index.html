<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sun Thief — II</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      cursor: none;
    }
    /* Subtle vignette overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      background: radial-gradient(ellipse at 50% 60%, transparent 40%, rgba(0,0,0,0.55) 100%);
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildOffscreen();
});

// ── Assets ────────────────────────────────────────────────────────────────────
const bgImg  = new Image(); bgImg.src  = 'Your.png';
const sunImg = new Image(); sunImg.src = 'Your __1_png';

let assetsLoaded = 0;
let offscreenBg  = null;

function onLoad() {
  assetsLoaded++;
  if (assetsLoaded === 2) { buildOffscreen(); initBalls(); loop(); }
}
bgImg.onload    = onLoad; bgImg.onerror    = onLoad;
sunImg.onload   = onLoad; sunImg.onerror   = onLoad;

// ── Offscreen bg: dark, desaturated, deep night ───────────────────────────────
function buildOffscreen() {
  offscreenBg = document.createElement('canvas');
  offscreenBg.width  = W;
  offscreenBg.height = H;
  const oc = offscreenBg.getContext('2d');

  oc.fillStyle = '#000000';
  oc.fillRect(0, 0, W, H);

  if (!bgImg.complete || bgImg.naturalWidth === 0) return;

  const iw = bgImg.naturalWidth, ih = bgImg.naturalHeight;
  const scale = Math.max(W / iw, H / ih);
  const dw = iw * scale, dh = ih * scale;
  // Add 2px buffer to ensure full coverage with no gaps
  const dx = Math.floor((W - dw) / 2) - 1, dy = Math.floor((H - dh) / 2) - 1;

  // Deep night but boys visible: more brightness, less crush
  oc.save();
  oc.filter = 'saturate(10%) brightness(55%) contrast(110%)';
  oc.drawImage(bgImg, dx, dy, dw + 2, dh + 2);
  oc.restore();

  // Blue-night tint wash
  oc.fillStyle = 'rgba(10, 14, 35, 0.25)';
  oc.fillRect(0, 0, W, H);

  // Heavy vignette
  const vig = oc.createRadialGradient(W/2, H*0.55, H*0.05, W/2, H*0.55, H*0.9);
  vig.addColorStop(0,   'rgba(0,0,0,0)');
  vig.addColorStop(0.6, 'rgba(0,0,0,0.15)');
  vig.addColorStop(1,   'rgba(0,0,0,0.65)');
  oc.fillStyle = vig;
  oc.fillRect(0, 0, W, H);
}

// ── Mouse — raw input + smoothed position ────────────────────────────────────
const mouseRaw = { x: -999, y: -999 };
const mouse    = { x: -999, y: -999, active: false };

window.addEventListener('mousemove', e => {
  mouseRaw.x = e.clientX; mouseRaw.y = e.clientY; mouse.active = true;
  if (!ballsSpawned) triggerSpawn();
});
window.addEventListener('touchmove', e => {
  mouseRaw.x = e.touches[0].clientX; mouseRaw.y = e.touches[0].clientY; mouse.active = true;
  if (!ballsSpawned) triggerSpawn();
}, { passive: true });

function smoothMouse() {
  const ease = 0.10;
  mouse.x += (mouseRaw.x - mouse.x) * ease;
  mouse.y += (mouseRaw.y - mouse.y) * ease;
}

// ── Ball pool ─────────────────────────────────────────────────────────────────
const BALL_CROPS = [
  { sx:0.12, sy:0.03, sw:0.29, sh:0.56 },
  { sx:0.60, sy:0.03, sw:0.29, sh:0.56 },
  { sx:0.22, sy:0.55, sw:0.18, sh:0.45 },
];

// Palette: warm amber-gold glow colours per ball variant
const GLOW_COLS = [
  { core:'rgba(255,235,120,',  mid:'rgba(255,160,30,',  outer:'rgba(200,80,5,' },
  { core:'rgba(255,220,90,',   mid:'rgba(240,130,20,',  outer:'rgba(180,55,8,' },
  { core:'rgba(255,245,160,',  mid:'rgba(255,190,50,',  outer:'rgba(220,100,10,' },
];

let balls        = [];
let ballsSpawned = false;
let nextSpawnId  = 0;
let lastSpawn    = 0;
const MAX_BALLS  = 55;   // final swarm size
const SPAWN_INTERVAL = 320; // ms between new ball births

function seededRand(s) {
  let v = s;
  return () => { v = (v*1664525+1013904223)&0xffffffff; return (v>>>0)/0xffffffff; };
}

class Ball {
  constructor(id, x, y) {
    this.id   = id;
    const r   = seededRand(id * 37 + 1);

    // Position: start near spawn point, scatter over sky region
    this.x  = x + (r()-0.5) * W * 0.55;
    this.y  = y + (r()-0.5) * H * 0.40;
    this.y  = Math.max(H * 0.04, Math.min(H * 0.72, this.y));

    // Base radius — smaller, exponential spread for variety
    const sizeT = r();
    this.baseR = (0.006 + Math.pow(sizeT, 2.0) * 0.032) * Math.min(W, H);

    // Idle drift
    this.floatX   = (r()-0.5) * 0.35;
    this.floatY   = -0.08 - r() * 0.18;   // gentle upward
    this.waveAmp  = 3 + r() * 8;
    this.waveFreq = 0.0004 + r() * 0.0006;
    this.wavePhase = r() * Math.PI * 2;
    this.phase2    = r() * Math.PI * 2;

    // Colour variant
    this.col      = GLOW_COLS[id % 3];
    this.cropIdx  = id % 3;

    // Pulse
    this.pulsePhase = r() * Math.PI * 2;
    this.pulseSpeed = 0.012 + r() * 0.018;

    // Fade in
    this.alpha     = 0;
    this.fadedIn   = false;
    this.fadeStart = performance.now() + r() * 200;

    // Drag / throw
    this.dragging  = false;
    this.dragOffX  = 0; this.dragOffY = 0;
    this.lastMX    = 0; this.lastMY  = 0;
    this.vx        = 0; this.vy      = 0;
    this.throwVX   = 0; this.throwVY = 0;
    this.flying    = false;
    this.returning = false;

    // Home (drifts slowly)
    this.homeX = this.x; this.homeY = this.y;

    // Proximity reaction
    this.scatter    = 0;   // 0-1, how much it's fleeing
    this.scatterVX  = 0;
    this.scatterVY  = 0;
  }

  update(ts, dt) {
    // Fade in
    if (!this.fadedIn) {
      const el = ts - this.fadeStart;
      this.alpha = Math.max(0, Math.min(1, el / 1800));
      if (this.alpha >= 1) this.fadedIn = true;
    }
    if (this.alpha <= 0) return;

    this.pulsePhase += this.pulseSpeed;

    if (this.dragging) {
      this.throwVX = (mouse.x - this.dragOffX - this.lastMX)*0.55 + this.throwVX*0.45;
      this.throwVY = (mouse.y - this.dragOffY - this.lastMY)*0.55 + this.throwVY*0.45;
      this.lastMX  = mouse.x - this.dragOffX;
      this.lastMY  = mouse.y - this.dragOffY;
      this.x = mouse.x - this.dragOffX;
      this.y = mouse.y - this.dragOffY;
      this.scatter = 0;
      return;
    }

    if (this.flying) {
      this.x += this.vx; this.y += this.vy;
      const r = this.baseR;
      if (this.x < -r*2 || this.x > W+r*2 || this.y < -r*2 || this.y > H+r*2) {
        this.flying = false; this.returning = true;
        if (this.x < -r*2)    this.x = W+r;
        else if (this.x>W+r*2) this.x = -r;
        if (this.y < -r*2)    this.y = H+r;
        else if (this.y>H+r*2) this.y = -r;
        const dx = this.homeX-this.x, dy = this.homeY-this.y;
        const d  = Math.hypot(dx,dy)||1;
        const spd = 3.5 + Math.random()*2;
        this.vx = dx/d*spd; this.vy = dy/d*spd;
      }
      return;
    }

    if (this.returning) {
      this.x += this.vx; this.y += this.vy;
      const dx = this.homeX-this.x, dy = this.homeY-this.y;
      const d  = Math.hypot(dx,dy);
      if (d < 60) { this.vx *= 0.88; this.vy *= 0.88; }
      if (d < 4)  { this.x = this.homeX; this.y = this.homeY; this.vx=0; this.vy=0; this.returning=false; }
      return;
    }

    // Proximity: mouse repulsion
    const mdx  = this.x - mouse.x;
    const mdy  = this.y - mouse.y;
    const mdist = Math.hypot(mdx, mdy);
    const REACT_RADIUS = 140;
    const FLEE_RADIUS  = 70;

    if (mouse.active && mdist < REACT_RADIUS) {
      const strength = 1 - mdist / REACT_RADIUS;
      if (mdist < FLEE_RADIUS) {
        // flee
        const fd = mdist || 1;
        this.scatterVX += (mdx/fd) * strength * 3.2;
        this.scatterVY += (mdy/fd) * strength * 3.2;
        this.scatter = Math.min(1, this.scatter + 0.08);
      } else {
        // wobble / brighten — already handled by pulse in draw
        this.scatter = Math.max(0, this.scatter - 0.03);
      }
    } else {
      this.scatter = Math.max(0, this.scatter - 0.025);
    }

    // Apply scatter drift
    this.scatterVX *= 0.88;
    this.scatterVY *= 0.88;

    // Idle float
    this.wavePhase += this.waveFreq * dt;
    this.phase2    += this.waveFreq * dt * 0.55;

    const wx = Math.sin(this.wavePhase)  * this.waveAmp;
    const wy = Math.cos(this.phase2)     * this.waveAmp * 0.6;

    this.homeX += this.floatX * (dt/16);
    this.homeY += this.floatY * (dt/16);

    // Softly wrap home if it drifts too high or off-screen
    if (this.homeY < -this.baseR * 3) {
      this.homeY = H + this.baseR;
      this.homeX = W * Math.random();
    }
    if (this.homeX < -this.baseR*3) this.homeX = W + this.baseR;
    if (this.homeX > W+this.baseR*3) this.homeX = -this.baseR;

    this.x = this.homeX + wx + this.scatterVX * 8;
    this.y = this.homeY + wy + this.scatterVY * 8;
  }

  release() {
    this.dragging = false; this.flying = true; this.returning = false;
    const spd = Math.hypot(this.throwVX, this.throwVY);
    const min = 8;
    if (spd < min) {
      const a = Math.atan2(this.throwVY, this.throwVX);
      this.vx = Math.cos(a)*min; this.vy = Math.sin(a)*min;
    } else {
      this.vx = this.throwVX*1.4; this.vy = this.throwVY*1.4;
    }
  }

  isHit(mx,my) { return Math.hypot(mx-this.x,my-this.y) < this.baseR*1.1; }

  draw() {
    if (this.alpha <= 0) return;
    const r     = this.baseR;
    const pulse = 0.5 + 0.5*Math.sin(this.pulsePhase);
    const near  = mouse.active ? Math.max(0, 1 - Math.hypot(this.x-mouse.x, this.y-mouse.y)/140) : 0;
    const glow  = pulse + near * 0.4;
    const a     = this.alpha;
    const col   = this.col;

    ctx.save();
    ctx.globalAlpha = a;

    // Outer atmospheric halo
    const halo = ctx.createRadialGradient(this.x,this.y,r*0.3, this.x,this.y,r*3.2);
    halo.addColorStop(0,   col.outer + (0.22*glow)+')');
    halo.addColorStop(0.4, col.outer + (0.08*glow)+')');
    halo.addColorStop(1,   col.outer + '0)');
    ctx.beginPath();
    ctx.arc(this.x, this.y, r*3.2, 0, Math.PI*2);
    ctx.fillStyle = halo;
    ctx.fill();

    // Mid glow
    const mid = ctx.createRadialGradient(this.x,this.y,0, this.x,this.y,r*1.6);
    mid.addColorStop(0,   col.mid + (0.85*glow)+')');
    mid.addColorStop(0.5, col.mid + (0.45*glow)+')');
    mid.addColorStop(1,   col.mid + '0)');
    ctx.beginPath();
    ctx.arc(this.x, this.y, r*1.6, 0, Math.PI*2);
    ctx.fillStyle = mid;
    ctx.fill();

    // (scan texture skipped — white background causes bleed on dark scenes)

    // Bright core
    const core = ctx.createRadialGradient(this.x,this.y,0, this.x,this.y,r*0.55);
    core.addColorStop(0,   col.core + Math.min(0.98, 0.88+near*0.10)+')');
    core.addColorStop(0.5, col.mid  + (0.75*glow)+')');
    core.addColorStop(1,   col.mid  + '0)');
    ctx.beginPath();
    ctx.arc(this.x, this.y, r*0.55, 0, Math.PI*2);
    ctx.fillStyle = core;
    ctx.fill();

    // no glint — keeps balls pure warm colour

    ctx.restore();
  }
}

// ── Spawn logic ───────────────────────────────────────────────────────────────
function initBalls() {
  // 3 seed balls placed in sky before mouse moves — dormant
  for (let i = 0; i < 3; i++) {
    const b = new Ball(i, W*(0.22+i*0.21), H*0.16);
    b.fadeStart = performance.now() + 99999; // won't fade until triggered
    balls.push(b);
  }
}

function triggerSpawn() {
  if (ballsSpawned) return;
  ballsSpawned = true;
  // Activate the 3 seed balls
  const ts = performance.now();
  balls.forEach((b,i) => { b.fadeStart = ts + i*400; });
  lastSpawn = ts;
}

function maybeSpawnMore(ts) {
  if (!ballsSpawned) return;
  if (balls.length >= MAX_BALLS) return;
  if (ts - lastSpawn < SPAWN_INTERVAL) return;
  lastSpawn = ts;

  // New ball born near an existing random ball
  const parent = balls[Math.floor(Math.random() * balls.length)];
  const id = nextSpawnId++;
  const b  = new Ball(id, parent.x, parent.y);
  // Spawn offset
  b.homeX = parent.homeX + (Math.random()-0.5) * W * 0.6;
  b.homeY = parent.homeY + (Math.random()-0.5) * H * 0.35;
  b.homeY = Math.max(H*0.03, Math.min(H*0.70, b.homeY));
  b.x = b.homeX; b.y = b.homeY;
  b.fadeStart = ts + Math.random()*300;
  balls.push(b);
}

// ── Drag ──────────────────────────────────────────────────────────────────────
let dragged = null;

window.addEventListener('mousedown', e => {
  for (let i = balls.length-1; i >= 0; i--) {
    const b = balls[i];
    if (b.fadedIn && b.isHit(e.clientX, e.clientY)) {
      dragged = b;
      b.dragging=true; b.flying=false; b.returning=false;
      b.dragOffX=e.clientX-b.x; b.dragOffY=e.clientY-b.y;
      b.lastMX=b.x; b.lastMY=b.y;
      b.throwVX=0; b.throwVY=0;
      break;
    }
  }
});
window.addEventListener('mouseup', () => { if(dragged){dragged.release();dragged=null;} });

window.addEventListener('touchstart', e => {
  const t = e.touches[0];
  for (let i=balls.length-1;i>=0;i--) {
    const b=balls[i];
    if(b.fadedIn&&b.isHit(t.clientX,t.clientY)){
      dragged=b; b.dragging=true; b.flying=false; b.returning=false;
      b.dragOffX=t.clientX-b.x; b.dragOffY=t.clientY-b.y;
      b.lastMX=b.x; b.lastMY=b.y; b.throwVX=0; b.throwVY=0;
      break;
    }
  }
},{passive:true});
window.addEventListener('touchend', ()=>{ if(dragged){dragged.release();dragged=null;} });

// ── Cursor ────────────────────────────────────────────────────────────────────
function drawCursor() {
  if (!mouse.active) return;
  const hovering = balls.some(b=>b.fadedIn&&b.isHit(mouse.x,mouse.y));
  const r   = hovering ? 9 : 5;
  const col = hovering ? 'rgba(255,220,80,0.95)' : 'rgba(255,200,100,0.45)';

  ctx.save();
  ctx.strokeStyle = col;
  ctx.lineWidth   = 1;

  // Broken crosshair
  const g = 4;
  [[mouse.x-r,mouse.y,mouse.x-g,mouse.y],[mouse.x+g,mouse.y,mouse.x+r,mouse.y],
   [mouse.x,mouse.y-r,mouse.x,mouse.y-g],[mouse.x,mouse.y+g,mouse.x,mouse.y+r]]
  .forEach(([x1,y1,x2,y2]) => {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });

  // Centre glow dot
  const cd = ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,3);
  cd.addColorStop(0,'rgba(255,230,120,0.9)');
  cd.addColorStop(1,'rgba(255,180,40,0)');
  ctx.beginPath(); ctx.arc(mouse.x,mouse.y,3,0,Math.PI*2);
  ctx.fillStyle=cd; ctx.fill();
  ctx.restore();
}

// ── Stars ─────────────────────────────────────────────────────────────────────
const STARS = Array.from({length:90},()=>({
  x: Math.random()*1, y: Math.random()*0.6,
  r: 0.3+Math.random()*1.0,
  a: 0.2+Math.random()*0.55,
  twinkle: Math.random()*Math.PI*2,
  speed: 0.001+Math.random()*0.002,
}));

function drawStars(ts) {
  ctx.save();
  STARS.forEach(s => {
    s.twinkle += s.speed * 16;
    const a = s.a * (0.6+0.4*Math.sin(s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(220,215,255,${a})`;
    ctx.fill();
  });
  ctx.restore();
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let lastTime = 0;

function loop(ts = 0) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  ctx.clearRect(0,0,W,H);
  smoothMouse();

  if (offscreenBg) ctx.drawImage(offscreenBg,0,0);
  else { ctx.fillStyle='#000000'; ctx.fillRect(0,0,W,H); }

  drawStars(ts);
  maybeSpawnMore(ts);

  // Sort by size so small ones render in front (depth)
  balls.sort((a,b)=>b.baseR-a.baseR);

  balls.forEach(b => b.update(ts,dt));
  balls.forEach(b => b.draw());

  drawCursor();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
